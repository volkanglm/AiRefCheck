version: "3.9"

services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    container_name: airefcheck-postgres
    environment:
      POSTGRES_USER: airefcheck
      POSTGRES_PASSWORD: airefcheck
      POSTGRES_DB: airefcheck
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U airefcheck"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Redis ----
  redis:
    image: redis:7-alpine
    container_name: airefcheck-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- NLP Service (Python) ----
  nlp:
    build:
      context: ../apps/nlp
      dockerfile: ../../docker/Dockerfile.nlp
    container_name: airefcheck-nlp
    ports:
      - "8000:8000"
    environment:
      - SPACY_MODEL_DIR=/app/models
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ---- Backend API ----
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    container_name: airefcheck-api
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://airefcheck:airefcheck@postgres:5432/airefcheck?schema=public
      - REDIS_URL=redis://redis:6379
      - NLP_SERVICE_URL=http://nlp:8000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      nlp:
        condition: service_healthy
    volumes:
      - upload_data:/app/uploads

  # ---- Frontend ----
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile.web
    container_name: airefcheck-web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001/api/v1
      - NEXT_PUBLIC_WS_URL=ws://localhost:3001
    depends_on:
      - api

  # ---- Nginx (Production Reverse Proxy) ----
  nginx:
    image: nginx:alpine
    container_name: airefcheck-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
      - api
    profiles:
      - production

volumes:
  postgres_data:
  redis_data:
  upload_data:
